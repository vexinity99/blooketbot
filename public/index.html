<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:400,700|Titan+One|Creepster|Satisfy|Eczar:700">
<link rel="icon" href="https://cdn.glitch.global/50648a61-8fe9-4ce0-a01c-baff9438bbf2/bblogo.png">
<title>Blooket Bot</title>
<style>
/* ======= Your previous CSS ======= */
.mainBody {margin:0; padding:0; position:absolute; top:0; left:0; font-family: Nunito, sans-serif; color:#3a3a3a; width:100%; min-height:100vh;}
.errorBar {position:absolute; top:100%; color:#fff; background-color:#e84135; min-height:55px; width:100%; left:0; padding:11px 5px 5px; box-sizing:border-box; box-shadow:inset 0 6px #0003; overflow:hidden; z-index:10; display:flex; justify-content:center; align-items:center; font-size:20px; transition:.3s;}
.joinButton {height:60px; width:60px; cursor:pointer; outline:none; background-color:#fff; padding-bottom:6px; box-shadow: inset 0 -6px #0003,0 0 4px #00000026; border-radius:5px; display:flex; justify-content:center; align-items:center; transition:.2s;}
.joinButton:hover {transform:scale(.9);}
.nameInput, .idInput {width:100%; height:100%; background-color:transparent; border:none; padding:5px; box-sizing:border-box; font-size:35px; font-weight:700; text-align:center; outline:none; color:#5f5f5f; font-family: Nunito, sans-serif;}
.idInputContainer, .nameInputContainer {width:200px; height:60px; padding-bottom:6px; box-shadow: inset 0 -6px #0003, 0 0 4px #00000026; background-color:#fff; border-radius:6px; margin:5px 0;}
.normtext {font-size:40px; color:#fff; text-align:left; margin-left:1px; font-family:Titan One, sans-serif; user-select:none;}
.btext {font-size:140%; color:#5f5f5f; user-select:none;}
#ctrlpanel {margin:9px;}
.inputcontainer {background-color:orange; display:inline-block; border-radius:4px; user-select:none; cursor:pointer;}
.inputcontainer>div {font-size:23px; text-align:center;}
.inputcontainer>input, .inputcontainer>select {margin:4px; text-align:center; font-size:18px;}
button {font-size:23px;}
.chat {position:fixed; margin:10px; background-color:orange; border-radius:10px;}
.chatcontainer {width:750px; height:250px; background-color:#202020a0; margin:10px; flex-direction:column-reverse; display:flex; overflow-y:auto;}
.chatmsg {color:white; font-size:22px; margin-left:1px;}
.chatinpcontainer {margin:10px;}
#chat {width:-webkit-fill-available; font-size:22px;}
.dragcontainer {background-color:orange; font-size:20px; position:absolute; border-radius:10px; font-weight:bold;}
#drag {margin:5px; user-select:none; cursor:move;}
</style>
</head>
<body>
<div class="mainBody" style="background-color: rgb(9, 148, 65); overflow:hidden;">

  <div class="codecontainer" id="cc">
    <div class="normtext">Enter code:</div>
    <div class="idInputContainer">
      <input id="gcode" class="idInput" placeholder="Game ID">
    </div>
    <div class="nameInputContainer">
      <input id="gname" class="nameInput" placeholder="Nickname">
    </div>
    <div class="joinButton">
      <div class="btext">Join</div>
    </div>
    <div class="normtext" style="display:none;" id="ostatus"></div>
    <div class="normtext">Incognito Mode:</div><input type="checkbox" id="icogmode" checked>
    <div class="normtext">Bypass Filter:</div><input type="checkbox" id="bcf">
    <div class="normtext">First Place Switch:</div><input type="checkbox" id="fpswitch" checked>
    <div class="normtext">*for first place switch to work your amount must not be a number!</div>
  </div>

  <div id="ctrlpanel"></div>
  <div class="normtext" id="status">Status: Loading...</div>
  <div class="normtext">Created by <a href="https://www.youtube.com/@crypto.7562" target="_blank">Ducklife3141</a></div>
  <div class="normtext"><a href="https://discord.com/invite/WYsFbAgY2v" target="_blank">Join the discord server!</a></div>
  <div class="errorBar" id="error"></div>

</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js"></script>
<!-- Zalgo script -->
<script src="https://zalgo.org/lunicode.js"></script>
<script src="script.js"></script>
</body>
</html>
