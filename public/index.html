<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blooket Bot</title>
<style>
body { font-family: sans-serif; background-color: #0b3d0b; color: white; text-align: center; padding: 2em; }
input { padding: 0.5em; font-size: 1.2em; margin: 0.5em; }
button { padding: 0.5em 1em; font-size: 1.2em; cursor: pointer; }
#status { margin-top: 1em; font-weight: bold; }
</style>
</head>
<body>
<h1>Blooket Bot</h1>
<input id="gid" placeholder="Game ID">
<input id="gname" placeholder="Nickname">
<button onclick="joinGame()">Join</button>
<div id="status">Status: Idle</div>

<script type="module">
import { initializeApp, getApp, deleteApp } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js';
import { getAuth, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js';

async function joinGame() {
  const gid = document.getElementById("gid").value;
  const name = document.getElementById("gname").value;
  const status = document.getElementById("status");
  status.innerText = "Fetching token...";

  try {
    const res = await fetch("/join", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: gid, name: name })
    });
    const body = await res.json();

    if (!body.success) {
      status.innerText = "Error: " + body.msg;
      return;
    }

    status.innerText = "Connecting to game...";
    const liveApp = initializeApp({
      apiKey: "AIzaSyCA-cTOnX19f6LFnDVVsHXya3k6ByP_MnU",
      authDomain: "blooket-2020.firebaseapp.com",
      projectId: "blooket-2020",
      storageBucket: "blooket-2020.appspot.com",
      messagingSenderId: "741533559105",
      appId: "1:741533559105:web:b8cbb10e6123f2913519c0",
      measurementId: "G-S3H5NGN10Z",
      databaseURL: body.fbShardURL
    }, Date.now().toString());

    const auth = getAuth(liveApp);
    await signInWithCustomToken(auth, body.fbToken);

    const db = getDatabase(liveApp);
    await set(ref(db, `${gid}/c/${name}`), { b: "Rainbow Astronaut", rt: true });

    status.innerText = "Connected!";
    onValue(ref(db, `${gid}`), data => console.log("Game update:", data.val()));
  } catch (err) {
    console.error(err);
    status.innerText = "Error connecting!";
  }
}
</script>
</body>
</html>
