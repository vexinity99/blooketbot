<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BlooketB</title>

<link rel="icon" href="https://blooket.com/favicon.ico">

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:400,700|Titan+One">

<style>

body{
margin:0;
font-family:Nunito;
background:#099441;
color:white;
}

.mainBody{
display:flex;
flex-direction:column;
align-items:center;
margin-top:80px;
}

.normtext{
font-size:40px;
font-family:"Titan One";
}

.idInputContainer,
.nameInputContainer{
width:200px;
height:60px;
background:white;
border-radius:6px;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
}

.idInput,
.nameInput{
border:none;
font-size:30px;
text-align:center;
width:100%;
outline:none;
}

.joinButton{
width:120px;
height:60px;
background:white;
color:#555;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}

.joinButton:hover{
transform:scale(.95);
}

.errorBar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#e84135;
padding:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="mainBody">

<div class="normtext">Enter code:</div>

<div class="idInputContainer">
<input id="gcode" class="idInput" placeholder="Game ID">
</div>

<div class="nameInputContainer">
<input id="gname" class="nameInput" placeholder="Nickname">
</div>

<div class="joinButton" id="joinButton">
Join
</div>

<div class="normtext" style="font-size:25px;margin-top:15px;" id="status">
Status: Ready
</div>

<label>
Incognito Mode
<input type="checkbox" id="icogmode" checked>
</label>

</div>

<div class="errorBar" id="error"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="https://zalgo.org/lunicode.js"></script>

<script src="/script.js"></script>

</body>

</html>
