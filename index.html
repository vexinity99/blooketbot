<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blooket Bot</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f9;
    margin: 0;
    padding: 20px;
  }

  #status {
    margin-bottom: 10px;
    font-weight: bold;
  }

  #controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    align-items: center;
  }

  #controls input, #controls button {
    padding: 5px 10px;
    font-size: 14px;
  }

  #onlinecount {
    margin-top: 5px;
    font-weight: bold;
  }

  .chat {
    position: absolute;
    left: 50px;
    top: 100px;
    width: 350px;
    height: 400px;
    border: 1px solid #ccc;
    background-color: #fff;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    border-radius: 8px;
    overflow: hidden;
  }

  #drag {
    background-color: #5a5a5a;
    color: #fff;
    cursor: move;
    padding: 5px;
    text-align: center;
    font-weight: bold;
  }

  .chatcontainer {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background-color: #f9f9f9;
  }

  .chatmsg {
    margin-bottom: 8px;
    padding: 4px 6px;
    border-radius: 4px;
    background-color: #e0e0e0;
  }

  #chat {
    border: none;
    border-top: 1px solid #ccc;
    padding: 8px;
    font-size: 14px;
    width: 100%;
    box-sizing: border-box;
    outline: none;
  }

  .error {
    color: red;
    margin-top: 5px;
  }
</style>
</head>
<body>

<div id="status">Status: Ready</div>

<div id="controls">
  <input type="text" id="gamecode" placeholder="Game code">
  <input type="text" id="name" placeholder="Your name">
  <button onclick="joinGame(document.querySelector('#gamecode').value, document.querySelector('#name').value, true)">Join</button>
</div>

<div id="onlinecount">Online: 0</div>
<div id="error" class="error"></div>

<div class="chat">
  <div id="drag">Drag</div>
  <div class="chatcontainer"></div>
  <input type="text" id="chat" placeholder="Type message and press Enter">
</div>

<script src="script.js"></script>
</body>
</html>
